name: CI

on:
  push:
    branches: [main, HOUSE-KEEPING]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest

      - name: Ruff (scoped)
        run: |
          python -m ruff check \
            cerebro/core/safety/deletion_gate.py \
            cerebro/core/session.py \
            cerebro/core/pipeline.py \
            cerebro/core/preview.py \
            cerebro/engines/orchestrator.py \
            cerebro/engines/turbo_file_engine.py \
            cerebro/v2/ui/delete_ceremony_widgets.py \
            cerebro/v2/ui/delete_flow.py \
            tests/test_deletion_gate.py \
            tests/test_session_tokens.py \
            tests/test_deletion_engine.py \
            tests/test_deletion_gate_integration.py \
            tests/test_preview_manager.py \
            main.py

      - name: Mypy (scoped)
        run: |
          python -m mypy --follow-imports=skip --ignore-missing-imports main.py

      - name: Pytest
        run: |
          sudo apt-get update && sudo apt-get install -y xvfb
          xvfb-run -a python -m pytest -q

      - name: Runtime smoke
        run: |
          python -c "import main; print('import main OK')"
          # Post-v1 audit Cut 3 invariant: only "files" is registered for file
          # scans. "files_classic" (FileDedupEngine) was removed. Assert both.
          python -c "from cerebro.engines.orchestrator import ScanOrchestrator; o=ScanOrchestrator(); assert type(o._engines['files']).__name__ == 'TurboFileEngine'; assert 'files_classic' not in o.get_available_modes(); print('single-entrance invariant OK')"
